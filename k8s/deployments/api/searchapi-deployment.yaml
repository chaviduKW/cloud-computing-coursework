apiVersion: apps/v1
kind: Deployment
metadata:
  name: searchapi
  namespace: techsalary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searchapi
  template:
    metadata:
      labels:
        app: searchapi
    spec:
      containers:
        - name: searchapi
          image: docker.io/chavidukalpana/techsalary-searchapi:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
