apiVersion: apps/v1
kind: Deployment
metadata:
  name: voteapi
  namespace: techsalary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: voteapi
  template:
    metadata:
      labels:
        app: voteapi
    spec:
      containers:
        - name: voteapi
          image: docker.io/chavidukalpana/techsalary-voteapi:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: "postgrescommunitydb.techsalary-data.svc.cluster.local"

            - name: DB_PORT
              value: "5432"

            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_COMMUNITY_DB

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
