apiVersion: apps/v1
kind: Deployment
metadata:
  name: salarysubmissionapi
  namespace: techsalary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: salarysubmissionapi
  template:
    metadata:
      labels:
        app: salarysubmissionapi
    spec:
      containers:
        - name: salarysubmissionapi
          image: docker.io/chavidukalpana/techsalary-salarysubmissionapi:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:

            - name: DB_HOST
              value: "postgresdb.techsalary-data.svc.cluster.local"

            - name: DB_PORT
              value: "5432"

            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD