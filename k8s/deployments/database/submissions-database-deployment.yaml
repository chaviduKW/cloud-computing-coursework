apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgressubmissionsdb
  namespace: techsalary-data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgressubmissionsdb
  template:
    metadata:
      labels:
        app: postgressubmissionsdb
    spec:
      containers:
        - name: postgressubmissionsdb
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_SUBMISSION_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgressubmissionsdb-data
              mountPath: /var/lib/postgresql/data
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d/
      volumes:
        - name: postgressubmissionsdb-data
          persistentVolumeClaim:
            claimName: postgres-storage-submissions
        - name: init-script
          configMap:
            name: submissions-init-script
