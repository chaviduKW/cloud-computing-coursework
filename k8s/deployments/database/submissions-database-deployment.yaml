apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresSubmissionsDb
  namespace: techsalary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgresSubmissionsDb
  template:
    metadata:
      labels:
        app: postgresSubmissionsDb
    spec:
      containers:
        - name: postgresSubmissionsDb
          image: postgres:16
          ports:
            - containerPort: 5434
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_SUBMISSION_DB

            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-db
              mountPath: /var/lib/postgresql/data
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d/
      volumes:
        - name: postgres-db
          persistentVolumeClaim:
            claimName: postgres-storage-submissions
        - name: init-script
          configMap:
            name: submissions-init-script