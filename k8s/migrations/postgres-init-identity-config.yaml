apiVersion: v1
kind: ConfigMap
metadata:
  name: identity-init-script
  namespace: techsalary
data:
  init.sql: |
    -- Create Users table
    CREATE TABLE IF NOT EXISTS "Users" (
        "UserId" UUID PRIMARY KEY,
        "FirstName" VARCHAR(100) NOT NULL,
        "LastName" VARCHAR(100) NOT NULL,
        "Email" VARCHAR(256) NOT NULL,
        "PasswordHash" TEXT NOT NULL,
        "Role" VARCHAR(50) NOT NULL DEFAULT 'User',
        "IsActive" BOOLEAN NOT NULL,
        "IsEmailVerified" BOOLEAN NOT NULL,
        "CreatedAt" TIMESTAMP WITH TIME ZONE NOT NULL,
        "UpdatedAt" TIMESTAMP WITH TIME ZONE NULL,
        "LastLoginAt" TIMESTAMP WITH TIME ZONE NULL
    );

    -- Unique index on Email
    CREATE UNIQUE INDEX IF NOT EXISTS "IX_Users_Email"
    ON "Users" ("Email");

    -- Create AuthRefreshTokens table
    CREATE TABLE IF NOT EXISTS "AuthRefreshTokens" (
        "RefreshTokenId" UUID PRIMARY KEY,
        "UserId" UUID NOT NULL,
        "Token" TEXT NOT NULL,
        "ExpiresAt" TIMESTAMP WITH TIME ZONE NOT NULL,
        "CreatedAt" TIMESTAMP WITH TIME ZONE NOT NULL,
        "IsRevoked" BOOLEAN NOT NULL,
        CONSTRAINT "FK_AuthRefreshTokens_Users_UserId"
            FOREIGN KEY ("UserId")
            REFERENCES "Users" ("UserId")
            ON DELETE CASCADE
    );

    -- Index for foreign key
    CREATE INDEX IF NOT EXISTS "IX_AuthRefreshTokens_UserId"
    ON "AuthRefreshTokens" ("UserId");