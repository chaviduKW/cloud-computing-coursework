apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-script
  namespace: techsalary-data
data:
  init.sql: |
    -- ── Identity schema ──────────────────────────────────────────────
    CREATE TABLE IF NOT EXISTS "Users" (
        "UserId" UUID PRIMARY KEY,
        "FirstName" VARCHAR(100) NOT NULL,
        "LastName" VARCHAR(100) NOT NULL,
        "Email" VARCHAR(256) NOT NULL,
        "PasswordHash" TEXT NOT NULL,
        "Role" VARCHAR(50) NOT NULL DEFAULT 'User',
        "IsActive" BOOLEAN NOT NULL,
        "IsEmailVerified" BOOLEAN NOT NULL,
        "CreatedAt" TIMESTAMP WITH TIME ZONE NOT NULL,
        "UpdatedAt" TIMESTAMP WITH TIME ZONE NULL,
        "LastLoginAt" TIMESTAMP WITH TIME ZONE NULL
    );

    CREATE UNIQUE INDEX IF NOT EXISTS "IX_Users_Email"
    ON "Users" ("Email");

    CREATE TABLE IF NOT EXISTS "AuthRefreshTokens" (
        "RefreshTokenId" UUID PRIMARY KEY,
        "UserId" UUID NOT NULL,
        "Token" TEXT NOT NULL,
        "ExpiresAt" TIMESTAMP WITH TIME ZONE NOT NULL,
        "CreatedAt" TIMESTAMP WITH TIME ZONE NOT NULL,
        "IsRevoked" BOOLEAN NOT NULL,
        CONSTRAINT "FK_AuthRefreshTokens_Users_UserId"
            FOREIGN KEY ("UserId")
            REFERENCES "Users" ("UserId")
            ON DELETE CASCADE
    );

    CREATE INDEX IF NOT EXISTS "IX_AuthRefreshTokens_UserId"
    ON "AuthRefreshTokens" ("UserId");

    -- ── Salary schema ─────────────────────────────────────────────────
    CREATE SCHEMA IF NOT EXISTS salary;

    CREATE TABLE IF NOT EXISTS salary.Submissions (
        Id UUID PRIMARY KEY,
        Country TEXT NOT NULL,
        Company TEXT NOT NULL,
        Role TEXT NOT NULL,
        ExperienceLevel TEXT,
        SalaryAmount INT NOT NULL,
        Currency TEXT NOT NULL,
        Anonymize BOOLEAN DEFAULT TRUE,
        Status TEXT DEFAULT 'PENDING',
        CreatedAt TIMESTAMP WITH TIME ZONE DEFAULT now()
    );

    CREATE TABLE IF NOT EXISTS salary.Companies (
        Id SERIAL PRIMARY KEY,
        CompanyName VARCHAR(200) NOT NULL,
        Description VARCHAR(500)
    );

    ALTER TABLE salary.Companies
    ADD CONSTRAINT uq_companies_companyname UNIQUE (CompanyName);

    INSERT INTO salary.Companies (CompanyName) VALUES
    ('WSO2'),
    ('IFS'),
    ('MillenniumIT'),
    ('99x'),
    ('CodeGen'),
    ('hSenid'),
    ('Zone24x7'),
    ('Virtusa'),
    ('Sysco LABS'),
    ('OrangeHRM'),
    ('Creative Software'),
    ('Epic Lanka'),
    ('Fortude'),
    ('LSEG')
    ON CONFLICT (CompanyName) DO NOTHING;

    CREATE TABLE IF NOT EXISTS salary.Designations (
        Id SERIAL PRIMARY KEY,
        DesignationName VARCHAR(200) NOT NULL,
        Description VARCHAR(500)
    );

    ALTER TABLE salary.Designations
    ADD CONSTRAINT uq_designations_designationName UNIQUE (DesignationName);

    INSERT INTO salary.Designations (DesignationName) VALUES
    ('Associate Software Engineer'),
    ('Software Engineer'),
    ('Senior Software Engineer'),
    ('Associate Technical Lead'),
    ('Technical Lead'),
    ('Engineering Manager'),
    ('Software Architect'),
    ('Principal Software Engineer'),
    ('QA Engineer'),
    ('Senior QA Engineer'),
    ('DevOps Engineer'),
    ('Site Reliability Engineer'),
    ('Full Stack Developer'),
    ('Cloud Engineer'),
    ('Platform Engineer'),
    ('Data Engineer'),
    ('UI/UX Designer'),
    ('System Administrator'),
    ('Network Engineer'),
    ('Security Engineer'),
    ('Product Owner'),
    ('Product Manager')
    ON CONFLICT (DesignationName) DO NOTHING;

    -- ── Community schema ──────────────────────────────────────────────
    CREATE SCHEMA IF NOT EXISTS community;

    CREATE TABLE IF NOT EXISTS community."votes" (
        "id" UUID PRIMARY KEY,
        "salarysubmissionid" UUID NOT NULL,
        "userid" UUID NOT NULL,
        "votetype" INTEGER NOT NULL,
        "createdat" TIMESTAMP WITH TIME ZONE NOT NULL
    );

    CREATE UNIQUE INDEX IF NOT EXISTS "IX_votes_salarysubmissionid_userid"
    ON community."votes" ("salarysubmissionid", "userid");
