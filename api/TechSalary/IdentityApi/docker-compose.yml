services:
  postgres:
    image: postgres:16-alpine
    container_name: techsalary-postgres
    restart: unless-stopped
    ports:
      - "25432:5432"
    environment:
      POSTGRES_DB: TechSalaryDB
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d TechSalaryDB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - identity-network

  api:
    build:
      context: .
      dockerfile: TechSalary.API/Dockerfile
    container_name: techsalary-identity-api
    restart: unless-stopped
    ports:
      - "5178:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=TechSalaryDB;Username=keycloak;Password=keycloak
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - identity-network

networks:
  identity-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
